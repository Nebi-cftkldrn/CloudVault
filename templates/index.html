<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudVault | Geleceğin Bulut Mimarisi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0e1015; color: #e2e8f0; }
        .navbar { background: rgba(14, 16, 21, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 15px 0; }
        .navbar-brand { font-weight: 800; color: #ffffff; font-size: 1.5rem; letter-spacing: 1px; }
        .navbar-brand:hover { color: #ff9900; }
        .nav-link { font-weight: 500; color: #a0aec0; margin: 0 10px; transition: all 0.3s ease; }
        .nav-link:hover { color: #ffffff; }
        .hero-section { padding: 130px 0; background: radial-gradient(circle at top right, #1a1e29 0%, #0e1015 60%); min-height: 85vh; display: flex; align-items: center; position: relative; overflow: hidden; }
        .hero-section::before { content: ''; position: absolute; top: -20%; right: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255, 153, 0, 0.12) 0%, transparent 70%); filter: blur(60px); z-index: 0; pointer-events: none; }
        .hero-content { position: relative; z-index: 1; }
        .hero-title { font-size: 4rem; font-weight: 800; color: #ffffff; letter-spacing: -1px; line-height: 1.1; margin-bottom: 1.5rem; }
        .text-highlight { color: #ff9900; text-shadow: 0 0 25px rgba(255, 153, 0, 0.35); }
        .hero-subtitle { font-size: 1.25rem; color: #94a3b8; line-height: 1.8; margin-bottom: 40px; font-weight: 400; max-width: 800px; margin-left: auto; margin-right: auto; }
        .btn-aws { background-color: #ff9900; color: #000000; padding: 14px 35px; border-radius: 8px; font-weight: 700; border: none; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(255, 153, 0, 0.25); }
        .btn-aws:hover { background-color: #ffaa33; color: #000; transform: translateY(-3px); box-shadow: 0 0 25px rgba(255, 153, 0, 0.45); }
        .btn-outline-dark-theme { border: 1px solid rgba(255, 255, 255, 0.15); color: #ffffff; padding: 14px 35px; border-radius: 8px; font-weight: 600; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(5px); transition: all 0.3s ease; }
        .btn-outline-dark-theme:hover { background: rgba(255, 255, 255, 0.1); color: #ffffff; border-color: rgba(255, 255, 255, 0.3); transform: translateY(-3px); }
        .btn-nav-login { border: 1px solid rgba(255, 153, 0, 0.7); color: #ff9900; padding: 8px 22px; border-radius: 6px; font-weight: 600; transition: all 0.3s ease; background: transparent; }
        .btn-nav-login:hover { background-color: rgba(255, 153, 0, 0.1); color: #ffaa33; box-shadow: 0 0 15px rgba(255, 153, 0, 0.2); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">☁️ CloudVault</a>
        <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border:none;">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav align-items-center">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">Hakkımızda</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('contact') }}">İletişim</a></li>
                <li class="nav-item ms-lg-4 mt-3 mt-lg-0">
                    <a class="btn-nav-login text-decoration-none" href="{{ url_for('login_page') }}">Giriş Yap</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="hero-section text-center">
    <div class="container hero-content">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <h1 class="hero-title">Verilerinizi Güvenle<br><span class="text-highlight">Buluta Taşıyın.</span></h1>
                <p class="hero-subtitle">
                    AWS S3 altyapısı ile desteklenen, MongoDB Atlas üzerinde meta veri yönetimi yapan, modern ve kullanıcı izoleli dosya depolama sistemi.
                </p>
                <div class="mt-5">
                    <a href="{{ url_for('login_page') }}" class="btn btn-aws btn-lg me-3">Hemen Ücretsiz Başla</a>
                    <a href="{{ url_for('about') }}" class="btn btn-outline-dark-theme btn-lg">Sistemi Keşfet</a>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
