<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudVault | İletişim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0e1015; color: #e2e8f0; }
        .navbar { background: rgba(14, 16, 21, 0.9); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 15px 0; }
        .navbar-brand { font-weight: 800; color: #ffffff; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 40px; margin-top: 50px; max-width: 650px; margin-left: auto; margin-right: auto; }
        .form-control { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; }
        .form-control:focus { background: rgba(0,0,0,0.5); border-color: #ff9900; color: white; box-shadow: 0 0 10px rgba(255, 153, 0, 0.2); }
        .btn-aws { background-color: #ff9900; color: #000; font-weight: 700; border: none; padding: 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">☁️ CloudVault</a>
        <div>
            {% if session.kullanici %}
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-sm">Panele Dön</a>
            {% else %}
                <a href="{{ url_for('index') }}" class="btn btn-outline-light btn-sm">Geri Dön</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    <div class="glass-card">
        <h3 class="fw-bold mb-4 text-center">Bizimle <span style="color: #ff9900;">İletişime Geçin</span></h3>
        <form action="{{ url_for('contact') }}" method="post">
            <div class="mb-3">
                <label class="form-label text-secondary">Adınız</label>
                <input type="text" name="ad" class="form-control" placeholder="Adınızı girin" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">E-posta</label>
                <input type="email" name="email" class="form-control" placeholder="ornek@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">Mesajınız</label>
                <textarea name="mesaj" class="form-control" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-aws w-100">Mesajı Gönder</button>
        </form>
    </div>
</div>

</body>
</html>
